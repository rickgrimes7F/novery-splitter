<!DOCTYPE html>
<html>
<head>
    <title>Novery Splitter Powered By Jarvis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Novery Splitter Powered By Jarvis</h1>

    <textarea
        id="inputBox"
        placeholder="Paste uid|pass|cookies here..."
    ></textarea>

    <button onclick="startChecking()">
        START
    </button>

    <div class="counterBox">
        <span id="okCounter">OK: 0</span>
        <span id="nvCounter">NV: 0</span>
    </div>

    <textarea
        id="logsBox"
        readonly
        placeholder="Logs will appear here..."
    ></textarea>

    <div class="copyBtns">
        <button onclick="copyOK()">COPY OK</button>
        <button onclick="copyNV()">COPY NV</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
